services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: ibkrdata
      POSTGRES_USER: ibkr
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ibkr -d ibkrdata"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  collector:
    build: ./collector
    env_file: .env
    network_mode: host
    environment:
      DB_URL: postgresql://ibkr:${POSTGRES_PASSWORD:-password}@localhost:5432/ibkrdata
      REDIS_URL: redis://localhost:6379
    restart: unless-stopped

  api:
    build: ./api
    env_file: .env
    network_mode: host
    environment:
      DB_URL: postgresql://ibkr:${POSTGRES_PASSWORD:-password}@localhost:5432/ibkrdata
      REDIS_URL: redis://localhost:6379
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  pgdata:
